plugins {
    id 'com.android.application'
}

android {
    namespace 'com.smarthub.app'
    compileSdk 33

    defaultConfig {
        applicationId "com.smarthub.app"
        minSdk 21
        targetSdk 22
        versionCode 1
        versionName "1.0"
        
        ndk {
            abiFilters "armeabi-v7a"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    aaptOptions {
        noCompress "sync"
    }
}

dependencies {
    // Corrected group ID and updated version
    implementation 'com.alphacephei:vosk-android:0.3.47'
    implementation 'net.java.dev.jna:jna:5.13.0@aar'
}
